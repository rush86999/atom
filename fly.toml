# fly.toml app configuration file generated for atom-saas on 2026-02-23T10:34:48-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'atom-saas'
primary_region = 'iad'

[build]
  dockerfile = 'frontend-nextjs/Dockerfile'

  [build.args]
    NEXT_PUBLIC_API_URL = 'https://atom-saas-api.fly.dev'
    release_command = './backend-saas/scripts/run_migrations.sh'

[env]
  API_BASE_URL = 'https://atom-saas-api.fly.dev'
  AWS_SQS_DISABLE_JSON_PROTOCOL = 'true'
  ENVIRONMENT = 'production'
  NEXTAUTH_URL = 'https://atom-saas.fly.dev'
  NEXT_PUBLIC_APP_URL = 'https://atom-saas.fly.dev'
  NODE_ENV = 'production'
  PORT = '3000'
  PYTHON_BACKEND_URL = 'https://atom-saas-api.fly.dev'
  ROLE = 'web'
  SCHEDULER_CALLBACK_URL = 'https://atom-saas-api.fly.dev:8080'

[processes]
  app = 'node server.js'


[[services]]
  protocol = 'tcp'
  internal_port = 3000
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 160

[[services]]
  protocol = 'tcp'
  internal_port = 8000
  processes = ['app']

  [[services.ports]]
    port = 8080
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 200
    soft_limit = 160

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
  processes = ['app']


