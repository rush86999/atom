[pytest]
# Pytest Configuration for Atom Testing Framework
# Supports property-based, fuzzy, mutation, and chaos testing
# E2E UI tests with Playwright (Phase 75)

# Test Discovery
pythonpath = .
testpaths = tests tests/fuzzing tests/browser_discovery tests/e2e_ui/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Note: CI pipelines use -m markers to separate fast vs slow tests
# PR tests: pytest -m "fast or property" (<10 minutes)
# Bug discovery: pytest -m "fuzzing or chaos or browser" (~2 hours)

# Markers
markers =
    # Test Type Markers
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, requires dependencies)
    property: Property-based tests using Hypothesis
    invariant: Invariant tests (critical system invariants)
    contract: API contract tests using Schemathesis
    fast: Fast tests (<0.1s)
    slow: Slow tests (> 1 second)
    fuzzy: Fuzzy tests using Atheris or python-fuzz
    mutation: Mutation testing validation
    chaos: Chaos engineering tests (failure injection, isolated environment, slow, weekly only)
    stress: Stress tests (high load, optional in CI)

    # Domain Markers
    financial: Financial operations tests
    security: Security validation tests
    api: API contract tests
    database: Database model tests
    workflow: Workflow execution tests
    episode: Episode management tests
    agent: Agent coordination tests
    governance: Agent governance tests

    # Priority Markers
    P0: Critical priority (security, financial)
    P1: High priority (core business logic)
    P2: Medium priority (API, tools)
    P3: Low priority (nice-to-have)

    # Governance Markers
    student: Tests for STUDENT maturity agents
    intern: Tests for INTERN maturity agents
    supervised: Tests for SUPERVISED maturity agents
    autonomous: Tests for AUTONOMOUS maturity agents

    # Quality Markers
    flaky: Tests that may be flaky and need retry (temporary workaround only)

    # Scenario Markers
    scenario: Scenario-based end-to-end tests

    # E2E UI Test Markers (Phase 75)
    e2e: End-to-end UI tests using Playwright
    ui: UI interaction tests
    auth: Authentication and authorization tests
    canvas: Canvas presentation tests

    # Bug Discovery Markers (Phase 237)
    fuzzing: Fuzzing tests using Atheris - run weekly
    browser: Browser automation bug discovery - run weekly
    discovery: General bug discovery tests - run weekly
    memory_leak: Memory leak detection tests using memray - run weekly (Phase 243-01)
    performance_regression: Performance regression tests (requires baseline) - run weekly (Phase 243-02)
    soak: Soak tests (long-running stability tests) - run weekly

