# Pre-commit configuration for Atom backend
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
#
# INSTALLATION:
#   pip install pre-commit
#   pre-commit install
#
# Run manually: pre-commit run --all-files

repos:
  # Basic Python checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-ast
      - id: check-docstring-first
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: debug-statements

  # Code formatting
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3.11

  # Linting
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=100', '--extend-ignore=E203']

  # Import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-pytz
          - types-requests
        args: [--ignore-missing-imports]
        exclude: ^tests/

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml']
        additional_dependencies: ['bandit[toml]']
        exclude: ^tests/

  # Coverage check (local development)
  - repo: local
    hooks:
      - id: pytest-with-coverage
        name: Run pytest with coverage check (55% minimum)
        entry: pytest --cov=core --cov=api --cov=tools --cov-fail-under=55 -q
        language: system
        pass_filenames: false
        always_run: true
