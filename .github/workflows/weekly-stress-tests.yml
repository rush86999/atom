name: Weekly Stress Tests

on:
  schedule:
    # Run at 3 AM UTC every Sunday (10 PM EST / 7 PM PST Saturday)
    - cron: '0 3 * * 0'
  workflow_dispatch:  # Allow manual trigger

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  comprehensive-stress-tests:
    name: Comprehensive Stress Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install -r requirements-testing.txt
          pip install pytest pytest-playwright
          playwright install chromium

      - name: Install k6
        run: npm install -g k6

      - name: Start backend server
        run: |
          cd backend
          python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 10

      - name: Verify backend is running
        run: |
          curl http://localhost:8000/health/live

      - name: Run all stress tests
        run: |
          cd backend
          pytest tests/load/ \
                 tests/e2e_ui/tests/test_network_*.py \
                 tests/e2e_ui/tests/test_memory_leak_detection.py \
                 tests/mobile_api/ \
                 tests/desktop/ \
                 frontend-nextjs/tests/visual/ \
                 frontend-nextjs/tests/accessibility/ \
                 -v --junitxml=stress-test-results.xml
        continue-on-error: true
        env:
          PWDEBUG: pw-api

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: stress-test-results
          path: backend/stress-test-results.xml
          retention-days: 30

      - name: Upload test screenshots
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-screenshots
          path: |
            backend/tests/e2e_ui/screenshots/
            frontend-nextjs/tests/visual/screenshots/
          retention-days: 30

      - name: Upload heap snapshots
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: heap-snapshots
          path: backend/tests/e2e_ui/heap-snapshots/
          retention-days: 30

      - name: Aggregate results
        run: |
          cd backend
          python tests/stress/test_scheduler.py aggregate \
            --results-file stress-test-results.xml \
            --output stress-test-summary.json
        continue-on-error: true

      - name: Send summary report
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          cd backend
          python tests/stress/test_scheduler.py report \
            --summary-file stress-test-summary.json \
            --slack
        continue-on-error: true

      - name: Send email alert on critical failure
        if: failure() && github.ref == 'refs/heads/main'
        env:
          EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          cd backend
          python tests/stress/test_scheduler.py send_alert \
            --results-file stress-test-results.xml \
            --alert-type email
        continue-on-error: true

      - name: File bugs for failures
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cd backend
          python tests/bug_discovery/file_bugs_from_artifacts.py
        continue-on-error: true

      - name: Upload aggregated summary
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: weekly-stress-test-summary
          path: backend/stress-test-summary.json
          retention-days: 90

      - name: Generate test report
        if: always()
        run: |
          cd backend
          echo "# Weekly Stress Test Report" > test-report.md
          echo "" >> test-report.md
          echo "**Date:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> test-report.md
          echo "**Commit:** ${{ github.sha }}" >> test-report.md
          echo "" >> test-report.md
          echo "## Summary" >> test-report.md
          python tests/stress/test_scheduler.py report \
            --summary-file stress-test-summary.json >> test-report.md 2>&1 || true

      - name: Upload test report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: weekly-test-report
          path: backend/test-report.md
          retention-days: 90
