name: Mobile Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test-mobile:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: ${{ runner.os }}-mobile-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-mobile-

      - name: Install dependencies
        working-directory: ./mobile
        run: npm ci

      - name: Run tests with coverage
        working-directory: ./mobile
        run: npm run test:coverage -- --maxWorkers=2

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-coverage
          path: mobile/coverage/coverage-final.json
          retention-days: 30
          if-no-files-found: warn

      - name: Check device service coverage
        working-directory: ./mobile
        run: |
          echo "### Device Service Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Statements | Lines | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------------|-------|--------|" >> $GITHUB_STEP_SUMMARY

          # Check cameraService
          CAMERA_STMTS=$(node -e "try { const c = require('fs').readFileSync('coverage/coverage-final.json', 'utf8'); const file = JSON.parse(c).find(f => f.path.includes('cameraService.ts')); console.log(file ? file.s.statements.pct : 0); } catch(e) { console.log(0); }")
          CAMERA_LINES=$(node -e "try { const c = require('fs').readFileSync('coverage/coverage-final.json', 'utf8'); const file = JSON.parse(c).find(f => f.path.includes('cameraService.ts')); console.log(file ? file.s.lines.pct : 0); } catch(e) { console.log(0); }")
          CAMERA_STATUS=$(echo "$CAMERA_LINES >= 80" | bc -l)
          if [ "$CAMERA_STATUS" -eq 1 ]; then
            echo "| cameraService | ${CAMERA_STMTS}% | ${CAMERA_LINES}% | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| cameraService | ${CAMERA_STMTS}% | ${CAMERA_LINES}% | ⚠️  BELOW |" >> $GITHUB_STEP_SUMMARY
            echo "::warning::cameraService coverage ${CAMERA_LINES}% is below 80% threshold"
          fi

          # Check locationService
          LOCATION_STMTS=$(node -e "try { const c = require('fs').readFileSync('coverage/coverage-final.json', 'utf8'); const file = JSON.parse(c).find(f => f.path.includes('locationService.ts')); console.log(file ? file.s.statements.pct : 0); } catch(e) { console.log(0); }")
          LOCATION_LINES=$(node -e "try { const c = require('fs').readFileSync('coverage/coverage-final.json', 'utf8'); const file = JSON.parse(c).find(f => f.path.includes('locationService.ts')); console.log(file ? file.s.lines.pct : 0); } catch(e) { console.log(0); }")
          LOCATION_STATUS=$(echo "$LOCATION_LINES >= 80" | bc -l)
          if [ "$LOCATION_STATUS" -eq 1 ]; then
            echo "| locationService | ${LOCATION_STMTS}% | ${LOCATION_LINES}% | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| locationService | ${LOCATION_STMTS}% | ${LOCATION_LINES}% | ⚠️  BELOW |" >> $GITHUB_STEP_SUMMARY
            echo "::warning::locationService coverage ${LOCATION_LINES}% is below 80% threshold"
          fi

          # Check notificationService
          NOTIF_STMTS=$(node -e "try { const c = require('fs').readFileSync('coverage/coverage-final.json', 'utf8'); const file = JSON.parse(c).find(f => f.path.includes('notificationService.ts')); console.log(file ? file.s.statements.pct : 0); } catch(e) { console.log(0); }")
          NOTIF_LINES=$(node -e "try { const c = require('fs').readFileSync('coverage/coverage-final.json', 'utf8'); const file = JSON.parse(c).find(f => f.path.includes('notificationService.ts')); console.log(file ? file.s.lines.pct : 0); } catch(e) { console.log(0); }")
          NOTIF_STATUS=$(echo "$NOTIF_LINES >= 80" | bc -l)
          if [ "$NOTIF_STATUS" -eq 1 ]; then
            echo "| notificationService | ${NOTIF_STMTS}% | ${NOTIF_LINES}% | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| notificationService | ${NOTIF_STMTS}% | ${NOTIF_LINES}% | ⚠️  BELOW |" >> $GITHUB_STEP_SUMMARY
            echo "::warning::notificationService coverage ${NOTIF_LINES}% is below 80% threshold"
          fi

          # Check offlineSyncService
          SYNC_STMTS=$(node -e "try { const c = require('fs').readFileSync('coverage/coverage-final.json', 'utf8'); const file = JSON.parse(c).find(f => f.path.includes('offlineSyncService.ts')); console.log(file ? file.s.statements.pct : 0); } catch(e) { console.log(0); }")
          SYNC_LINES=$(node -e "try { const c = require('fs').readFileSync('coverage/coverage-final.json', 'utf8'); const file = JSON.parse(c).find(f => f.path.includes('offlineSyncService.ts')); console.log(file ? file.s.lines.pct : 0); } catch(e) { console.log(0); }")
          SYNC_STATUS=$(echo "$SYNC_LINES >= 80" | bc -l)
          if [ "$SYNC_STATUS" -eq 1 ]; then
            echo "| offlineSyncService | ${SYNC_STMTS}% | ${SYNC_LINES}% | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| offlineSyncService | ${SYNC_STMTS}% | ${SYNC_LINES}% | ⚠️  BELOW |" >> $GITHUB_STEP_SUMMARY
            echo "::warning::offlineSyncService coverage ${SYNC_LINES}% is below 80% threshold"
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** 80% statements and lines for all device services" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See \`mobile/coverage-summary.md\` for detailed gap analysis." >> $GITHUB_STEP_SUMMARY

      - name: Check navigation coverage
        working-directory: ./mobile
        run: |
          echo "### Navigation Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Statements | Branches | Functions | Lines | Status |" >> $GITHUB_STEP_SUMMARY
          echo("|------|------------|----------|-----------|-------|--------|" >> $GITHUB_STEP_SUMMARY

          # Check AppNavigator
          APPNAV_STMTS=$(node -e "try { const c = require('fs').readFileSync('coverage/coverage-final.json', 'utf8'); const file = JSON.parse(c).find(f => f.path.includes('AppNavigator.tsx')); console.log(file ? file.s.statements.pct : 0); } catch(e) { console.log(0); }")
          APPNAV_BRANCH=$(node -e "try { const c = require('fs').readFileSync('coverage/coverage-final.json', 'utf8'); const file = JSON.parse(c).find(f => f.path.includes('AppNavigator.tsx')); console.log(file ? file.s.branches.pct : 0); } catch(e) { console.log(0); }")
          APPNAV_FUNCS=$(node -e "try { const c = require('fs').readFileSync('coverage/coverage-final.json', 'utf8'); const file = JSON.parse(c).find(f => f.path.includes('AppNavigator.tsx')); console.log(file ? file.s.functions.pct : 0); } catch(e) { console.log(0); }")
          APPNAV_LINES=$(node -e "try { const c = require('fs').readFileSync('coverage/coverage-final.json', 'utf8'); const file = JSON.parse(c).find(f => f.path.includes('AppNavigator.tsx')); console.log(file ? file.s.lines.pct : 0); } catch(e) { console.log(0); }")
          APPNAV_STATUS=$(echo "$APPNAV_LINES >= 80" | bc -l)
          if [ "$APPNAV_STATUS" -eq 1 ]; then
            echo "| AppNavigator | ${APPNAV_STMTS}% | ${APPNAV_BRANCH}% | ${APPNAV_FUNCS}% | ${APPNAV_LINES}% | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| AppNavigator | ${APPNAV_STMTS}% | ${APPNAV_BRANCH}% | ${APPNAV_FUNCS}% | ${APPNAV_LINES}% | ⚠️  BELOW |" >> $GITHUB_STEP_SUMMARY
            echo "::warning::AppNavigator coverage ${APPNAV_LINES}% is below 80% threshold"
          fi

          # Check AuthNavigator
          AUTHNAV_STMTS=$(node -e "try { const c = require('fs').readFileSync('coverage/coverage-final.json', 'utf8'); const file = JSON.parse(c).find(f => f.path.includes('AuthNavigator.tsx')); console.log(file ? file.s.statements.pct : 0); } catch(e) { console.log(0); }")
          AUTHNAV_BRANCH=$(node -e "try { const c = require('fs').readFileSync('coverage/coverage-final.json', 'utf8'); const file = JSON.parse(c).find(f => f.path.includes('AuthNavigator.tsx')); console.log(file ? file.s.branches.pct : 0); } catch(e) { console.log(0); }")
          AUTHNAV_FUNCS=$(node -e "try { const c = require('fs').readFileSync('coverage/coverage-final.json', 'utf8'); const file = JSON.parse(c).find(f => f.path.includes('AuthNavigator.tsx')); console.log(file ? file.s.functions.pct : 0); } catch(e) { console.log(0); }")
          AUTHNAV_LINES=$(node -e "try { const c = require('fs').readFileSync('coverage/coverage-final.json', 'utf8'); const file = JSON.parse(c).find(f => f.path.includes('AuthNavigator.tsx')); console.log(file ? file.s.lines.pct : 0); } catch(e) { console.log(0); }")
          AUTHNAV_STATUS=$(echo "$AUTHNAV_LINES >= 80" | bc -l)
          if [ "$AUTHNAV_STATUS" -eq 1 ]; then
            echo "| AuthNavigator | ${AUTHNAV_STMTS}% | ${AUTHNAV_BRANCH}% | ${AUTHNAV_FUNCS}% | ${AUTHNAV_LINES}% | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| AuthNavigator | ${AUTHNAV_STMTS}% | ${AUTHNAV_BRANCH}% | ${AUTHNAV_FUNCS}% | ${AUTHNAV_LINES}% | ⚠️  BELOW |" >> $GITHUB_STEP_SUMMARY
            echo "::warning::AuthNavigator coverage ${AUTHNAV_LINES}% is below 80% threshold"
          fi

          # Calculate overall navigation coverage
          NAV_LINES=$(node -e "try { const c = require('fs').readFileSync('coverage/coverage-final.json', 'utf8'); const files = JSON.parse(c).filter(f => f.path.includes('AppNavigator.tsx') || f.path.includes('AuthNavigator.tsx')); const totalStmts = files.reduce((sum, f) => sum + f.s.statements.total, 0); const coveredStmts = files.reduce((sum, f) => sum + f.s.statements.covered, 0); const totalLines = files.reduce((sum, f) => sum + f.s.lines.total, 0); const coveredLines = files.reduce((sum, f) => sum + f.s.lines.covered, 0); console.log(Math.round((coveredLines / totalLines) * 100)); } catch(e) { console.log(0); }")
          NAV_STATUS=$(echo "$NAV_LINES >= 80" | bc -l)

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall:** ${NAV_LINES}% coverage (target: 80%)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See \`mobile/coverage-navigation-summary.md\` for detailed gap analysis." >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with device coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Read coverage data
            let coverageData;
            try {
              coverageData = JSON.parse(fs.readFileSync('mobile/coverage/coverage-final.json', 'utf8'));
            } catch (e) {
              console.log('Coverage file not found');
              return;
            }

            // Extract device service coverage
            const getServiceCoverage = (serviceName) => {
              const file = coverageData.find(f => f.path.includes(serviceName));
              if (!file) return { statements: 0, lines: 0 };
              return {
                statements: file.s.statements.pct,
                lines: file.s.lines.pct
              };
            };

            const camera = getServiceCoverage('cameraService.ts');
            const location = getServiceCoverage('locationService.ts');
            const notif = getServiceCoverage('notificationService.ts');
            const sync = getServiceCoverage('offlineSyncService.ts');

            // Format coverage report
            const report = `
            ## 🔍 Device Service Coverage Report

            | Service | Statements | Lines | Status |
            |---------|------------|-------|--------|
            | cameraService | ${camera.statements}% | ${camera.lines}% | ${camera.lines >= 80 ? '✅' : '⚠️'} |
            | locationService | ${location.statements}% | ${location.lines}% | ${location.lines >= 80 ? '✅' : '⚠️'} |
            | notificationService | ${notif.statements}% | ${notif.lines}% | ${notif.lines >= 80 ? '✅' : '⚠️'} |
            | offlineSyncService | ${sync.statements}% | ${sync.lines}% | ${sync.lines >= 80 ? '✅' : '⚠️'} |

            **Target:** 80% statements and lines for all device services

            ${camera.lines < 80 || location.lines < 80 || notif.lines < 80 || sync.lines < 80 ? '⚠️ **Action Required:** Some services are below the 80% threshold. See `mobile/coverage-summary.md` for gap analysis.' : '✅ All services meet the 80% coverage target!'}

            <details>
            <summary>View coverage details</summary>

            See [coverage report](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            </details>
            `;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Device Service Coverage Report')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            }

      - name: Comment PR with navigation coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Read coverage data
            let coverageData;
            try {
              coverageData = JSON.parse(fs.readFileSync('mobile/coverage/coverage-final.json', 'utf8'));
            } catch (e) {
              console.log('Coverage file not found');
              return;
            }

            // Extract navigation coverage
            const getFileCoverage = (fileName) => {
              const file = coverageData.find(f => f.path.includes(fileName));
              if (!file) return { statements: 0, branches: 0, functions: 0, lines: 0 };
              return {
                statements: file.s.statements.pct,
                branches: file.s.branches.pct,
                functions: file.s.functions.pct,
                lines: file.s.lines.pct
              };
            };

            const appNav = getFileCoverage('AppNavigator.tsx');
            const authNav = getFileCoverage('AuthNavigator.tsx');
            const overallLines = Math.round((appNav.lines + authNav.lines) / 2);

            // Format coverage report
            const report = `
            ## 🧭 Navigation Coverage Report

            | File | Statements | Branches | Functions | Lines | Status |
            |------|------------|----------|-----------|-------|--------|
            | AppNavigator | ${appNav.statements}% | ${appNav.branches}% | ${appNav.functions}% | ${appNav.lines}% | ${appNav.lines >= 80 ? '✅' : '⚠️'} |
            | AuthNavigator | ${authNav.statements}% | ${authNav.branches}% | ${authNav.functions}% | ${authNav.lines}% | ${authNav.lines >= 80 ? '✅' : '⚠️'} |

            **Overall:** ${overallLines}% coverage (target: 80%)

            ${appNav.lines < 80 || authNav.lines < 80 ? '⚠️ **Action Required:** Some navigation files are below the 80% threshold. See `mobile/coverage-navigation-summary.md` for gap analysis.' : '✅ All navigation files meet the 80% coverage target!'}

            <details>
            <summary>View coverage details</summary>

            See [coverage report](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) | [gap analysis](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/mobile/coverage-navigation-summary.md)
            </details>
            `;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Navigation Coverage Report')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            }

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-coverage-html
          path: mobile/coverage/lcov-report
          retention-days: 7
          if-no-files-found: warn

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./mobile/coverage/lcov.info
          flags: mobile
          fail_ci_if_error: false
