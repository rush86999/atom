name: Bug Discovery & Remediation

on:
  schedule:
    # Run every Monday at 3 AM UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      run_fuzzing:
        description: 'Run fuzzing discovery'
        required: false
        default: true
        type: boolean
      run_chaos:
        description: 'Run chaos engineering'
        required: false
        default: false  # Disabled by default (requires isolation)
        type: boolean
      run_property:
        description: 'Run property-based tests'
        required: false
        default: true
        type: boolean
      run_browser:
        description: 'Run browser discovery'
        required: false
        default: true
        type: boolean
      run_memory:
        description: 'Run memory leak tests'
        required: false
        default: true
        type: boolean
      run_performance:
        description: 'Run performance regression tests'
        required: false
        default: true
        type: boolean
      run_ai_enhanced:
        description: 'Run AI-enhanced discovery'
        required: false
        default: true
        type: boolean
      file_issues:
        description: 'File bugs to GitHub'
        required: false
        default: true
        type: boolean
      duration_seconds:
        description: 'Duration per discovery method (seconds)'
        required: false
        default: 3600
        type: choice
        options:
          - 1800
          - 3600
          - 7200

env:
  PYTHON_VERSION: '3.11'

jobs:
  bug-discovery:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 hours
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e backend
          pip install -r backend/requirements-testing.txt

      - name: Run full bug discovery cycle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FRONTEND_URL: http://localhost:3000
        run: |
          python -c "
          import sys
          import os
          sys.path.insert(0, 'backend')

          from tests.bug_discovery.feedback_loops.bug_execution_orchestrator import BugExecutionOrchestrator
          from tests.bug_discovery.feedback_loops.bug_remediation_service import BugRemediationService
          import json

          # Parse workflow inputs
          run_fuzzing = ${{ github.event.inputs.run_fuzzing != 'false' && true || false || true }}
          run_chaos = ${{ github.event.inputs.run_chaos == 'true' && true || false }}
          run_property = ${{ github.event.inputs.run_property != 'false' && true || false || true }}
          run_browser = ${{ github.event.inputs.run_browser != 'false' && true || false || true }}
          run_memory = ${{ github.event.inputs.run_memory != 'false' && true || false || true }}
          run_performance = ${{ github.event.inputs.run_performance != 'false' && true || false || true }}
          run_ai_enhanced = ${{ github.event.inputs.run_ai_enhanced != 'false' && true || false || true }}
          file_issues = ${{ github.event.inputs.file_issues != 'false' && true || false || true }}
          duration_seconds = int('${{ github.event.inputs.duration_seconds || '3600' }}')

          print(f'Configuration:')
          print(f'  Fuzzing: {run_fuzzing}')
          print(f'  Chaos: {run_chaos}')
          print(f'  Property: {run_property}')
          print(f'  Browser: {run_browser}')
          print(f'  Memory: {run_memory}')
          print(f'  Performance: {run_performance}')
          print(f'  AI-Enhanced: {run_ai_enhanced}')
          print(f'  File Issues: {file_issues}')
          print(f'  Duration: {duration_seconds}s')

          # Initialize orchestrator
          orchestrator = BugExecutionOrchestrator(
              github_token=os.getenv('GITHUB_TOKEN'),
              github_repo=os.getenv('GITHUB_REPOSITORY')
          )

          # Run discovery
          print('')
          print('='*80)
          print('Running bug discovery cycle...')
          print('='*80)

          results = orchestrator.run_full_discovery_cycle(
              run_fuzzing=run_fuzzing,
              run_chaos=run_chaos,
              run_property=run_property,
              run_browser=run_browser,
              run_memory=run_memory,
              run_performance=run_performance,
              run_ai_enhanced=run_ai_enhanced,
              duration_seconds=duration_seconds
          )

          print('')
          print('='*80)
          print('Discovery Results')
          print('='*80)
          print(f'Bugs found: {results[\"bugs_found\"]}')
          print(f'Unique bugs: {results[\"unique_bugs\"]}')
          print(f'Duration: {results[\"duration_seconds\"]:.1f}s')
          print(f'By severity: {results[\"bugs_by_severity\"]}')
          print(f'By method: {results[\"bugs_by_method\"]}')

          # Save results to JSON
          results_path = orchestrator.save_discovery_results(results)
          print(f'Saved results to {results_path}')

          # Initialize remediation service
          remediation = BugRemediationService(
              github_token=os.getenv('GITHUB_TOKEN'),
              github_repo=os.getenv('GITHUB_REPOSITORY')
          )

          # Triage and prioritize
          print('')
          print('='*80)
          print('Triaging and prioritizing bugs...')
          print('='*80)

          prioritized_bugs = remediation.triage_and_prioritize(results['all_bugs'])

          print(f'Top 10 critical bugs:')
          for bug in prioritized_bugs[:10]:
              print(f'  {bug.priority_rank}. {bug.test_name} - {bug.error_message[:60]}...')

          # File to GitHub if enabled
          filed = []
          if file_issues:
              print('')
              print('='*80)
              print('Filing bugs to GitHub...')
              print('='*80)

              # File top 20 bugs
              filed = remediation.file_bugs_to_github(prioritized_bugs[:20])
              results['filed_bugs'] = len([f for f in filed if f.get('status') == 'created'])

          # Track progress
          print('')
          print('='*80)
          print('Tracking fix progress...')
          print('='*80)

          fix_progress = remediation.track_fix_progress(prioritized_bugs)

          # Generate report
          print('')
          print('='*80)
          print('Generating remediation report...')
          print('='*80)

          report_path = remediation.save_remediation_report(
              results, filed, fix_progress
          )

          print(f'Saved report to {report_path}')

          # Print summary
          print('')
          print('='*80)
          print('SUMMARY')
          print('='*80)
          print(f'Bugs found: {results[\"bugs_found\"]}')
          print(f'Unique bugs: {results[\"unique_bugs\"]}')
          print(f'Bugs filed: {results[\"filed_bugs\"]}')
          print(f'Fix rate: {fix_progress[\"fix_rate\"]:.1%}')
          print(f'Report: {report_path}')

          # Output for GitHub Actions
          with open('discovery_summary.json', 'w') as f:
              json.dump({
                  'bugs_found': results['bugs_found'],
                  'unique_bugs': results['unique_bugs'],
                  'filed_bugs': results['filed_bugs'],
                  'fix_rate': fix_progress['fix_rate'],
                  'report_path': report_path,
                  'run_id': results['run_id']
              }, f, indent=2)
          "

      - name: Upload discovery results
        uses: actions/upload-artifact@v3
        with:
          name: bug-discovery-results
          path: |
            backend/tests/bug_discovery/storage/discovery_runs/*.json
            backend/tests/bug_discovery/storage/discovery_runs/*.md
            discovery_summary.json
          retention-days: 90

      - name: Upload discovery report
        uses: actions/upload-artifact@v3
        with:
          name: bug-discovery-report
          path: backend/tests/bug_discovery/storage/discovery_runs/remediation_report_*.md
          retention-days: 90

      - name: Print summary
        run: |
          echo "## Bug Discovery Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f discovery_summary.json ]; then
            cat discovery_summary.json | jq -r '"- Bugs Found: \(.bugs_found)"' >> $GITHUB_STEP_SUMMARY
            cat discovery_summary.json | jq -r '"- Unique Bugs: \(.unique_bugs)"' >> $GITHUB_STEP_SUMMARY
            cat discovery_summary.json | jq -r '"- Bugs Filed: \(.filed_bugs)"' >> $GITHUB_STEP_SUMMARY
            cat discovery_summary.json | jq -r '"- Fix Rate: \(.fix_rate * 100)%"' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment on PR (if on PR)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'backend/tests/bug_discovery/storage/discovery_runs/remediation_report_*.md';
            const glob = require('glob');

            const files = glob.sync(reportPath);
            if (files.length > 0) {
              const report = fs.readFileSync(files[0], 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## Bug Discovery Results\n\n${report.slice(0, 6000)}...\n\n[View Full Report](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              });
            }

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '## Bug Discovery Workflow Failed\n\n';
            summary += `**Run ID:** ${context.runId}\n`;
            summary += `**Workflow:** ${context.workflow}\n`;
            summary += `**Triggered by:** ${context.actor}\n`;
            summary += `**Branch:** ${context.ref}\n\n`;
            summary += 'Please check the [workflow logs](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') for details.\n';

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Bug Discovery Failed - ${new Date().toISOString().split('T')[0]}`,
              body: summary,
              labels: ['bug-discovery', 'failed']
            });
