name: Coverage Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          cd backend
          pytest --cov=core --cov=api --cov=tools --cov-report=json --cov-report=html --cov-report=term-missing --cov-fail-under=0

      - name: Update trending data
        run: |
          cd backend
          python tests/coverage_reports/trend_tracker.py ${{ github.event_name }} ${{ github.run_number }}

      - name: Check for regression
        run: |
          cd backend
          python -c "
          from tests.coverage_reports.trend_tracker import detect_regression
          import json, sys
          result = detect_regression('tests/coverage_reports/metrics/trending.json')
          if result['regression']:
              print(f'REGRESSION DETECTED: {result[\"message\"]}')
              print(f'Previous: {result[\"from\"]}% -> Current: {result[\"to\"]}%')
              sys.exit(1)
          else:
              print(result['message'])
          "

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            backend/tests/coverage_reports/html/
            backend/tests/coverage_reports/metrics/coverage.json
            backend/tests/coverage_reports/metrics/trending.json
          retention-days: 30

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('backend/tests/coverage_reports/metrics/coverage.json'));
            const pct = coverage.totals.percent_covered.toFixed(2);
            const covered = coverage.totals.covered_lines.toLocaleString();
            const total = coverage.totals.num_statements.toLocaleString();

            const comment = `## Coverage Report

            **Current Coverage:** ${pct}% (${covered}/${total} lines)

            ### Module Breakdown
            - **core:** Module coverage available in HTML report
            - **api:** Module coverage available in HTML report
            - **tools:** Module coverage available in HTML report

            ### Reports
            - Full HTML report available in workflow artifacts
            - Historical trends tracked in trending.json
            - Run \`pytest --cov\` locally to reproduce

            <details>
            <summary>View detailed metrics</summary>

            \`\`\`
            Overall Coverage: ${pct}%
            Lines Covered: ${covered}
            Lines Total: ${total}
            \`\`\`
            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
