name: Coverage Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements*.txt'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          cd backend
          pytest --cov=core --cov=api --cov=tools --cov-report=json --cov-report=html --cov-report=term-missing
        env:
          DATABASE_URL: sqlite:///./test_ci.db
          ATOM_HOST_MOUNT_ENABLED: false

      - name: Update trending data
        run: |
          cd backend
          python tests/coverage_reports/trend_tracker.py ${{ github.event_name }} ${{ github.run_number }}

      - name: Generate coverage trend report
        run: |
          cd backend
          python tests/scripts/generate_coverage_trend.py --html-output tests/coverage_reports/metrics/coverage_trend_report.html

      - name: Check for regression
        run: |
          cd backend
          python -c "
          from tests.coverage_reports.trend_tracker import detect_regression
          import json, sys

          result = detect_regression('tests/coverage_reports/metrics/trending.json')

          if result['regression']:
              print(f'REGRESSION DETECTED: {result[\"message\"]}')
              print(f'Coverage decreased from {result[\"from\"]}% to {result[\"to\"]}%')
              print(f'Threshold: {result.get(\"threshold\", -1.0)}%')
              sys.exit(1)
          else:
              print(result['message'])
              if 'from' in result and 'to' in result:
                  print(f'Coverage change: {result[\"from\"]}% → {result[\"to\"]}%')
          "

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            backend/tests/coverage_reports/html/
            backend/tests/coverage_reports/metrics/coverage.json
            backend/tests/coverage_reports/metrics/trending.json
            backend/tests/coverage_reports/metrics/coverage_trend_report.html
          retention-days: 30

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read coverage data
            const coverageData = JSON.parse(
              fs.readFileSync('backend/tests/coverage_reports/metrics/coverage.json', 'utf8')
            );

            const pct = coverageData.totals.percent_covered.toFixed(2);
            const covered = coverageData.totals.covered_lines.toLocaleString();
            const total = coverageData.totals.num_statements.toLocaleString();
            const missing = coverageData.totals.missing_lines.toLocaleString();

            // Read trending data
            let trendText = '';
            try {
              const trendingData = JSON.parse(
                fs.readFileSync('backend/tests/coverage_reports/metrics/trending.json', 'utf8')
              );

              if (trendingData.history && trendingData.history.length >= 2) {
                const latest = trendingData.history[trendingData.history.length - 1];
                const previous = trendingData.history[trendingData.history.length - 2];
                const change = (latest.coverage_pct - previous.coverage_pct).toFixed(2);

                const emoji = change > 0 ? '📈' : change < 0 ? '📉' : '➡️';
                trendText = `${emoji} Trend: ${change > 0 ? '+' : ''}${change}% from previous`;
              }
            } catch (e) {
              console.log('Could not read trend data:', e);
            }

            // Build comment body
            const body = `## Coverage Report

**Current Coverage:** ${pct}%
**Lines:** ${covered} / ${total} covered (${missing} missing)
${trendText}

### Detailed Reports

Full coverage reports are available in the workflow artifacts:
- \`coverage.json\` - Machine-readable coverage data
- \`trending.json\` - Historical coverage trends
- \`html/\` - Interactive HTML report

### How to View Locally

\`\`\`bash
# Download artifacts from the workflow run
# Unzip and open:
open backend/tests/coverage_reports/html/index.html
\`\`\`

---

*Report generated by [Coverage Report Workflow](.github/workflows/coverage-report.yml)*`;

            // Post comment
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Coverage summary
        run: |
          cd backend
          python -c "
          import json
          with open('tests/coverage_reports/metrics/coverage.json') as f:
              data = json.load(f)
          pct = data['totals']['percent_covered']
          covered = data['totals']['covered_lines']
          total = data['totals']['num_statements']
          print(f'## Coverage Summary')
          print(f'**Coverage:** {pct:.2f}%')
          print(f'**Lines:** {covered:,} / {total:,}')
          print(f'**Missing:** {total - covered:,} lines')
          "

      - name: Fail on coverage decrease
        if: steps.check_regression.outputs.status == 'failure'
        run: |
          echo "::error::Coverage regression detected. Please review test changes."
          exit 1
