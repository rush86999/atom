name: Coverage Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements*.txt'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          cd backend
          pytest --cov=core --cov=api --cov=tools --cov-report=json --cov-report=html --cov-report=term-missing
        env:
          DATABASE_URL: sqlite:///./test_ci.db
          ATOM_HOST_MOUNT_ENABLED: false

      - name: Update trending data
        run: |
          cd backend
          python tests/coverage_reports/trend_tracker.py ${{ github.event_name }} ${{ github.run_number }}

      - name: Generate coverage trend report
        run: |
          cd backend
          python tests/scripts/generate_coverage_trend.py --html-output tests/coverage_reports/metrics/coverage_trend_report.html

      - name: Check for regression
        run: |
          cd backend
          python -c "
          from tests.coverage_reports.trend_tracker import detect_regression
          import json, sys

          result = detect_regression('tests/coverage_reports/metrics/trending.json')

          if result['regression']:
              print(f'REGRESSION DETECTED: {result[\"message\"]}')
              print(f'Coverage decreased from {result[\"from\"]}% to {result[\"to\"]}%')
              print(f'Threshold: {result.get(\"threshold\", -1.0)}%')
              sys.exit(1)
          else:
              print(result['message'])
              if 'from' in result and 'to' in result:
                  print(f'Coverage change: {result[\"from\"]}% → {result[\"to\"]}%')
          "

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            backend/tests/coverage_reports/html/
            backend/tests/coverage_reports/metrics/coverage.json
            backend/tests/coverage_reports/metrics/trending.json
            backend/tests/coverage_reports/metrics/coverage_trend_report.html
          retention-days: 30

      - name: Generate PR comment payload
        if: github.event_name == 'pull_request'
        run: |
          cd backend
          python tests/scripts/pr_coverage_comment_bot.py \
            --coverage-file tests/coverage_reports/metrics/coverage.json \
            --base-branch origin/main \
            --output-file pr_comment_payload.json

      - name: Post PR comment with coverage delta
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const payload = JSON.parse(
              fs.readFileSync('backend/pr_comment_payload.json', 'utf8')
            );

            // Find existing comment to avoid duplicates
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('## Coverage Report')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: payload.body
              });
              console.log('Updated existing coverage comment');
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: payload.body
              });
              console.log('Created new coverage comment');
            }

      - name: Coverage summary
        run: |
          cd backend
          python -c "
          import json
          with open('tests/coverage_reports/metrics/coverage.json') as f:
              data = json.load(f)
          pct = data['totals']['percent_covered']
          covered = data['totals']['covered_lines']
          total = data['totals']['num_statements']
          print(f'## Coverage Summary')
          print(f'**Coverage:** {pct:.2f}%')
          print(f'**Lines:** {covered:,} / {total:,}')
          print(f'**Missing:** {total - covered:,} lines')
          "

      - name: Fail on coverage decrease
        if: steps.check_regression.outputs.status == 'failure'
        run: |
          echo "::error::Coverage regression detected. Please review test changes."
          exit 1
