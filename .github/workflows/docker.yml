name: Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: atom:test
          build-args: |
            BYOK_ENCRYPTION_KEY=dummy-key-for-ci
            JWT_SECRET_KEY=dummy-jwt-for-ci
