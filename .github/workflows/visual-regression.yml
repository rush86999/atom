name: Visual Regression Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  percy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          playwright install --with-deps chromium
          cd frontend-nextjs && npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: ./frontend-nextjs
        run: npm run build

      - name: Start services
        run: |
          docker-compose -f docker-compose-e2e-ui.yml up -d
          ./scripts/start-e2e-env.sh

      - name: Run visual regression tests
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
        run: |
          cd frontend-nextjs
          npx percy exec -- pytest ../backend/tests/e2e_ui/tests/visual/ -v

      - name: Upload Percy results
        if: always()
        run: |
          echo "## Percy Visual Regression Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Percy has captured screenshots and compared them against baselines." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Review Results" >> $GITHUB_STEP_SUMMARY
          echo "- Check your Percy dashboard for visual diffs" >> $GITHUB_STEP_SUMMARY
          echo "- Approve intentional changes" >> $GITHUB_STEP_SUMMARY
          echo "- Reject and fix unintended regressions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Setup Required (First Run)" >> $GITHUB_STEP_SUMMARY
          echo "If this is your first run, create a Percy project at https://percy.io" >> $GITHUB_STEP_SUMMARY
          echo "and add \`PERCY_TOKEN\` to your GitHub repository secrets." >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: docker-compose -f docker-compose-e2e-ui.yml down
