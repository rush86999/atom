name: Bug Discovery Weekly

on:
  schedule:
    # Run every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration for discovery methods (seconds)'
        required: false
        default: '3600'

env:
  PYTHON_VERSION: '3.11'

jobs:
  bug-discovery:
    name: Unified Bug Discovery Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -e .
          pip install -r requirements-testing.txt

      - name: Run unified bug discovery
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FRONTEND_URL: http://localhost:3000
          DATABASE_URL: sqlite:///./test_bug_discovery.db
        run: |
          cd backend
          python -c "
          from tests.bug_discovery.core import run_discovery
          import os
          result = run_discovery(
              github_token=os.getenv('GITHUB_TOKEN'),
              github_repository=os.getenv('GITHUB_REPOSITORY'),
              duration_seconds=int(os.getenv('DURATION', '3600'))
          )
          print(f'Bugs found: {result[\"bugs_found\"]}')
          print(f'Unique bugs: {result[\"unique_bugs\"]}')
          print(f'Bugs filed: {result[\"filed_bugs\"]}')
          print(f'Report: {result[\"report_path\"]}')
          "

      - name: Upload weekly report artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: bug-discovery-reports
          path: |
            backend/tests/bug_discovery/storage/reports/*.html
            backend/tests/bug_discovery/storage/reports/*.json
          retention-days: 30
