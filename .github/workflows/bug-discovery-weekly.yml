name: Weekly Bug Discovery Tests

on:
  schedule:
    - cron: '0 3 * * 0'  # Sunday 3 AM UTC
  workflow_dispatch:  # Allow manual trigger

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  bug-discovery:
    name: Bug Discovery Tests (~2 hours)
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install -r requirements-testing.txt
          pip install atheris  # Fuzzing support
          playwright install chromium

      - name: Run bug discovery tests
        run: |
          cd backend
          pytest tests/ -m "fuzzing or chaos or browser" \
            --tb=long \
            --junitxml=bug-discovery-results.xml \
            --maxfail=50
        timeout-minutes: 120
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: bug-discovery-results
          path: backend/bug-discovery-results.xml
          retention-days: 90

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: bug-discovery-screenshots
          path: backend/tests/artifacts/screenshots/
          retention-days: 90

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: bug-discovery-logs
          path: backend/tests/artifacts/logs/
          retention-days: 90

      - name: Generate test report
        if: always()
        run: |
          cd backend
          echo "# Weekly Bug Discovery Test Report" > test-report.md
          echo "" >> test-report.md
          echo "**Date:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> test-report.md
          echo "**Commit:** ${{ github.sha }}" >> test-report.md
          echo "**Workflow:** ${{ github.workflow }}" >> test-report.md
          echo "" >> test-report.md
          echo "## Summary" >> test-report.md
          echo "- **Test Selection:** \`fuzzing or chaos or browser\` markers" >> test-report.md
          echo "- **Duration:** ~2 hours" >> test-report.md
          echo "- **Schedule:** Weekly (Sunday 3 AM UTC)" >> test-report.md
          echo "" >> test-report.md
          echo "## Test Categories" >> test-report.md
          echo "- **Fuzzing:** Coverage-guided crash discovery with Atheris" >> test-report.md
          echo "- **Chaos:** Failure injection (network, database, memory)" >> test-report.md
          echo "- **Browser:** Console errors, accessibility, broken links" >> test-report.md

      - name: Upload test report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: weekly-bug-discovery-report
          path: backend/test-report.md
          retention-days: 90

      - name: File bugs for failures
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cd backend
          python tests/bug_discovery/file_bugs_from_artifacts.py
        continue-on-error: true
