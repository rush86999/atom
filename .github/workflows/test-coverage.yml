name: Test Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for diff

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -e backend/[test,test-quality]
        pip install pytest-cov diff-cover

    - name: Run tests with coverage
      run: |
        cd backend
        pytest tests/ -v \
          --cov=. \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          --cov-fail-under=25 \
          --json-report --json-report-file=pytest_report.json

    - name: Validate test pass rate
      run: |
        cd backend
        python tests/scripts/check_pass_rate.py \
          --json-file pytest_report.json \
          --minimum 98 \
          --verbose

    - name: Check coverage diff
      run: |
        pip install diff-cover
        diff-cover backend/coverage.xml --compare-branch=origin/main --fail-under=5

    - name: Generate coverage metrics JSON
      working-directory: ./backend
      run: |
        # Ensure metrics directory exists
        mkdir -p tests/coverage_reports/metrics

        # Generate trending data
        if [ -f coverage.xml ]; then
          python tests/scripts/generate_coverage_trend.py || echo "Trend generation failed (non-blocking)"
        fi

        # Copy coverage report to metrics location
        if [ -f htmlcov/coverage.json ]; then
          cp htmlcov/coverage.json tests/coverage_reports/metrics/coverage.json
        fi

    - name: Run quality gate enforcement
      id: gates
      working-directory: ./backend
      env:
        COVERAGE_MIN: 80
        PASS_RATE_MIN: 98
        REGRESSION_THRESHOLD: 5
      run: |
        python3 tests/scripts/ci_quality_gate.py \
          --coverage-min $COVERAGE_MIN \
          --pass-rate-min $PASS_RATE_MIN \
          --regression-threshold $REGRESSION_THRESHOLD \
          || GATES_FAILED=true

        if [ "$GATES_FAILED" = "true" ]; then
          echo "::error::Quality gates failed. See details above."
          exit 1
        fi

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: |
          backend/htmlcov/
          backend/coverage.xml
          backend/tests/coverage_reports/metrics/

    - name: Report coverage to PR
      if: github.event_name == 'pull_request'
      uses: py-cov-action/python-coverage-comment-action@v3
      with:
        GITHUB_TOKEN: ${{ github.token }}
        MINIMUM_GREEN: 80
        MINIMUM_ORANGE: 60

    - name: PR comment with coverage summary
      if: failure() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          let coveragePct = 'N/A';
          let baselinePct = 'N/A';

          try {
            const covData = JSON.parse(fs.readFileSync('backend/tests/coverage_reports/metrics/coverage.json', 'utf8'));
            coveragePct = covData.totals.percent_covered.toFixed(2) + '%';
          } catch (e) {
            console.log('Could not read coverage.json');
          }

          const comment = `## 📊 Coverage Report

          **Current Coverage:** ${coveragePct}
          **Baseline:** ${baselinePct}

          ### Coverage Gate Status
          ${coveragePct !== 'N/A' && parseFloat(coveragePct) < 80 ? '❌ **FAILED** - Coverage below 80% threshold' : '✅ **PASSED** - Coverage meets 80% threshold'}

          ### Remediation
          If coverage is below 80%:
          1. Identify uncovered lines in the coverage report above
          2. Add tests for high-value modules first
          3. Re-run tests to verify improvement

          See [CODEOWNERS_QUALITY.md](backend/.github/CODEOWNERS_QUALITY.md) for details.

          ---

          *This comment was automatically generated by the test-coverage workflow.*`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
