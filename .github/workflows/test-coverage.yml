name: Test Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for diff

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -e backend/[test,test-quality]
        pip install pytest-cov diff-cover

    - name: Run tests with coverage
      run: |
        cd backend
        pytest tests/ -v \
          --cov=. \
          --cov-report=xml \
          --cov-report=html:htmlcov \
          --cov-report=json \
          --cov-report=term-missing \
          --cov-fail-under=25 \
          --json-report --json-report-file=pytest_report.json

    - name: Generate enhanced coverage report
      run: |
        cd backend
        python tests/scripts/coverage_report_generator.py \
          --skip-run \
          --threshold 80 \
          --output tests/coverage_reports/metrics/coverage_summary.txt

    - name: Validate test pass rate
      run: |
        cd backend
        python tests/scripts/check_pass_rate.py \
          --json-file pytest_report.json \
          --minimum 98 \
          --verbose

    - name: Check coverage diff
      run: |
        pip install diff-cover
        diff-cover backend/coverage.xml --compare-branch=origin/main --fail-under=5

    - name: Generate coverage metrics JSON
      working-directory: ./backend
      run: |
        # Ensure metrics directory exists
        mkdir -p tests/coverage_reports/metrics

        # Copy coverage.json to metrics location
        if [ -f coverage.json ]; then
          cp coverage.json tests/coverage_reports/metrics/coverage.json
        fi

        # Generate trending data
        if [ -f coverage.xml ]; then
          python tests/scripts/generate_coverage_trend.py || echo "Trend generation failed (non-blocking)"
        fi

    - name: Enhance HTML coverage report
      run: |
        cd backend
        python tests/scripts/enhance_html_coverage.py || echo "HTML enhancement failed (non-blocking)"

    - name: Run quality gate enforcement
      id: gates
      working-directory: ./backend
      env:
        COVERAGE_MIN: 80
        PASS_RATE_MIN: 98
        REGRESSION_THRESHOLD: 5
      run: |
        python3 tests/scripts/ci_quality_gate.py \
          --coverage-min $COVERAGE_MIN \
          --pass-rate-min $PASS_RATE_MIN \
          --regression-threshold $REGRESSION_THRESHOLD \
          || GATES_FAILED=true

        if [ "$GATES_FAILED" = "true" ]; then
          echo "::error::Quality gates failed. See details above."
          exit 1
        fi

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: |
          backend/htmlcov/
          backend/coverage.json
          backend/coverage.xml
          backend/tests/coverage_reports/metrics/
          backend/tests/coverage_reports/metrics/coverage_summary.txt
        if-no-files-found: warn

    - name: Report coverage to PR
      if: github.event_name == 'pull_request'
      uses: py-cov-action/python-coverage-comment-action@v3
      with:
        GITHUB_TOKEN: ${{ github.token }}
        MINIMUM_GREEN: 80
        MINIMUM_ORANGE: 60

    - name: Enhanced PR comment with coverage details
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          let coveragePct = 'N/A';
          let branchPct = 'N/A';
          let coveredLines = 'N/A';
          let totalLines = 'N/A';
          let missingLines = 'N/A';
          let belowThreshold = [];

          try {
            const covData = JSON.parse(fs.readFileSync('backend/tests/coverage_reports/metrics/coverage.json', 'utf8'));
            const totals = covData.totals;

            coveragePct = totals.percent_covered.toFixed(2) + '%';
            branchPct = totals.percent_branches_covered.toFixed(2) + '%';
            coveredLines = totals.covered_lines.toLocaleString();
            totalLines = totals.num_statements.toLocaleString();
            missingLines = totals.missing_lines.toLocaleString();

            // Find modules below 80% threshold
            const threshold = 80;
            for (const [filePath, fileData] of Object.entries(covData.files)) {
              const pct = fileData.summary.percent_covered;
              if (pct < threshold && pct > 0) {
                belowThreshold.push({
                  path: filePath.replace('backend/', ''),
                  pct: pct.toFixed(2),
                  missing: fileData.summary.missing_lines
                });
              }
            }

            // Sort by coverage and take top 5
            belowThreshold.sort((a, b) => a.pct - b.pct);
            belowThreshold = belowThreshold.slice(0, 5);

          } catch (e) {
            console.log('Could not read coverage.json:', e.message);
          }

          // Build comment
          let comment = `## 📊 Coverage Report

          ### Overall Metrics
          | Metric | Value |
          |--------|-------|
          | **Line Coverage** | ${coveragePct} |
          | **Branch Coverage** | ${branchPct} |
          | **Covered Lines** | ${coveredLines} / ${totalLines} |
          | **Missing Lines** | ${missingLines} |

          ### Coverage Gate Status
          ${coveragePct !== 'N/A' && parseFloat(coveragePct) < 80 ? '❌ **FAILED** - Coverage below 80% threshold' : '✅ **PASSED** - Coverage meets 80% threshold'}
          `;

          if (belowThreshold.length > 0) {
            comment += `\n### ⚠️ Modules Below 80% Coverage\n\n`;
            comment += `| Module | Coverage | Missing |\n`;
            comment += `|--------|----------|--------|\n`;
            for (const mod of belowThreshold) {
              comment += `| \`${mod.path}\` | ${mod.pct}% | ${mod.missing} |\n`;
            }
          }

          comment += `\n### 📈 Coverage Trend\n\n`;
          comment += `View detailed HTML report in workflow artifacts.\n\n`;
          comment += `### 🔍 Actions Needed\n\n`;
          if (coveragePct !== 'N/A' && parseFloat(coveragePct) < 80) {
            comment += `- Review modules below 80% threshold\n`;
            comment += `- Add tests for high-value modules first\n`;
            comment += `- Focus on critical paths and error handling\n`;
          } else {
            comment += `- ✅ Coverage is healthy\n`;
            comment += `- Consider adding tests for edge cases\n`;
          }
          comment += `\n---\n\n*This comment was automatically generated by the test-coverage workflow.*`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
