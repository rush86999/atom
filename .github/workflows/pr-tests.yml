name: Fast PR Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  fast-tests:
    name: Fast Tests (<10 min)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install -r requirements-testing.txt
          playwright install chromium

      - name: Run fast PR tests
        run: |
          cd backend
          pytest tests/ -m "fast or property" -n auto --tb=short \
            --junitxml=pr-test-results.xml \
            --maxfail=20
        timeout-minutes: 10

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: pr-test-results
          path: backend/pr-test-results.xml
          retention-days: 30

      - name: Comment on PR with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🧪 Fast PR Test Results\n\n';
            comment += '**Status:** ' + '${{ job.status }}' + '\n\n';
            comment += '✅ Fast tests completed in <10 minutes\n\n';
            comment += '**Test Selection:** `fast or property` markers\n\n';
            comment += '**Note:** Bug discovery tests (fuzzing, chaos, browser) run weekly - see `.github/workflows/bug-discovery-weekly.yml`\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
        continue-on-error: true
