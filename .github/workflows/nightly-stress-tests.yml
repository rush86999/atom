name: Nightly Stress Tests

on:
  schedule:
    # Run at 2 AM UTC every night (9 PM EST / 6 PM PST)
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  load-tests:
    name: Load Testing (k6)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install k6
        run: npm install -g k6

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install -r requirements-testing.txt

      - name: Start backend server
        run: |
          cd backend
          python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 10

      - name: Verify backend is running
        run: |
          curl http://localhost:8000/health/live

      - name: Run baseline load test
        run: |
          cd backend/tests/load
          k6 run test_api_load_baseline.js --out json=baseline-results.json
        continue-on-error: true

      - name: Run moderate load test
        run: |
          cd backend/tests/load
          k6 run test_api_load_moderate.js --out json=moderate-results.json
        continue-on-error: true

      - name: Upload load test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: load-test-results
          path: backend/tests/load/*-results.json
          retention-days: 30

  network-tests:
    name: Network Simulation Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install -r requirements-testing.txt
          pip install pytest-playwright
          playwright install chromium

      - name: Start backend server
        run: |
          cd backend
          python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 10

      - name: Run network simulation tests
        run: |
          cd backend
          pytest tests/e2e_ui/tests/test_network_slow_3g.py \
                 tests/e2e_ui/tests/test_network_offline.py \
                 -v --junitxml=network-test-results.xml
        continue-on-error: true
        env:
          PWDEBUG: pw-api

      - name: Upload network test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: network-test-results
          path: backend/network-test-results.xml
          retention-days: 30

      - name: Upload network test screenshots
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: network-test-screenshots
          path: backend/tests/e2e_ui/screenshots/
          retention-days: 30

  memory-tests:
    name: Memory Leak Detection Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install -r requirements-testing.txt
          pip install pytest-playwright
          playwright install chromium

      - name: Start backend server
        run: |
          cd backend
          python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 10

      - name: Run memory leak detection tests
        run: |
          cd backend
          pytest tests/e2e_ui/tests/test_memory_leak_detection.py \
                 -v --junitxml=memory-test-results.xml
        continue-on-error: true
        env:
          PWDEBUG: pw-api

      - name: Upload memory test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: memory-test-results
          path: backend/memory-test-results.xml
          retention-days: 30

      - name: Upload heap snapshots
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: heap-snapshots
          path: backend/tests/e2e_ui/heap-snapshots/
          retention-days: 30

  aggregate-results:
    name: Aggregate and Report Results
    runs-on: ubuntu-latest
    needs: [load-tests, network-tests, memory-tests]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install requests

      - name: Download load test results
        uses: actions/download-artifact@v3
        with:
          name: load-test-results
          path: backend/tests/load/

      - name: Download network test results
        uses: actions/download-artifact@v3
        with:
          name: network-test-results
          path: backend/

      - name: Download memory test results
        uses: actions/download-artifact@v3
        with:
          name: memory-test-results
          path: backend/

      - name: Aggregate test results
        run: |
          cd backend
          python tests/stress/test_scheduler.py aggregate \
            --load-results tests/load/*-results.json \
            --network-results network-test-results.xml \
            --memory-results memory-test-results.xml \
            --output stress-test-summary.json
        continue-on-error: true

      - name: Generate summary report
        run: |
          cd backend
          python tests/stress/test_scheduler.py report \
            --summary-file stress-test-summary.json
        continue-on-error: true

      - name: Send Slack alert on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          cd backend
          python tests/stress/test_scheduler.py send_alert \
            --results-file stress-test-summary.json \
            --alert-type slack
        continue-on-error: true

      - name: File bugs for failures
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cd backend
          python tests/bug_discovery/file_bugs_from_artifacts.py
        continue-on-error: true

      - name: Upload aggregated summary
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: stress-test-summary
          path: backend/stress-test-summary.json
          retention-days: 90
