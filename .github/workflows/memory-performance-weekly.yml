name: Memory & Performance Discovery Weekly

on:
  schedule:
    # Run every Sunday at 3 AM UTC (1 hour after bug-discovery-weekly)
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration for discovery methods (seconds)'
        required: false
        default: '3600'

env:
  PYTHON_VERSION: '3.11'

jobs:
  memory-leaks:
    name: Memory Leak Detection
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -e .
          pip install -r requirements-testing.txt

      - name: Run memory leak tests
        run: |
          cd backend
          pytest tests/memory_leaks/ -v -m memory_leak -n 1
        env:
          PYTHONPATH: /Users/rushiparikh/projects/atom/backend

      - name: Upload flame graphs
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: memray-flame-graphs
          path: backend/tests/memory_leaks/artifacts/
          retention-days: 30

  performance-regression:
    name: Performance Regression Detection
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -e .
          pip install -r requirements-testing.txt

      - name: Run performance regression tests
        run: |
          cd backend
          pytest tests/performance_regression/ --benchmark-only --benchmark-compare=baseline --benchmark-compare-fail=mean:20%
        env:
          PYTHONPATH: /Users/rushiparikh/projects/atom/backend

      - name: Upload benchmark results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: benchmark-results
          path: |
            backend/tests/performance_regression/.benchmarks/
            backend/tests/performance_regression/benchmark_*.json
          retention-days: 30

  lighthouse-ci:
    name: Lighthouse Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Lighthouse CLI
        run: npm install -g lighthouse

      - name: Verify Lighthouse installation
        run: lighthouse --version

      - name: Start backend server
        run: |
          cd backend
          python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          echo "Backend server starting..."
          sleep 10

      - name: Start frontend server
        run: |
          cd frontend-nextjs
          npm install
          npm run build
          npm start &
          echo "Frontend server starting..."
          sleep 10

      - name: Verify servers are running
        run: |
          curl -f http://localhost:8000/health/live || exit 1
          curl -f http://localhost:3001 || exit 1
          echo "Both servers are running"

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v9
        with:
          urls: |
            http://localhost:3001/
            http://localhost:3001/dashboard
            http://localhost:3001/agents
            http://localhost:3001/workflows
          uploadArtifacts: true
          temporaryPublicStorage: true
          chromeFlags: --headless

      - name: Check for Lighthouse regression
        run: |
          python backend/tests/scripts/check_lighthouse_regression.py \
            --current .lighthouseci/lhr-report.json \
            --baseline backend/tests/performance_regression/lighthouse_baseline.json \
            --threshold 0.2

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 30

      - name: Stop servers
        if: always()
        run: |
          pkill -f "uvicorn main:app" || true
          pkill -f "npm start" || true

  weekly-report:
    name: Generate Weekly Report
    runs-on: ubuntu-latest
    needs: [memory-leaks, performance-regression, lighthouse-ci]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -e .
          pip install -r requirements-testing.txt

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts/

      - name: Run memory and performance discovery
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FRONTEND_URL: http://localhost:3000
          DATABASE_URL: sqlite:///./test_memory_performance.db
        run: |
          cd backend
          python -c "
          from tests.bug_discovery.core import run_memory_performance_discovery
          import os
          result = run_memory_performance_discovery(
              github_token=os.getenv('GITHUB_TOKEN'),
              github_repository=os.getenv('GITHUB_REPOSITORY'),
              upload_artifacts=True
          )
          print(f'Memory leaks found: {result[\"memory_leaks\"][\"bugs_found\"]}')
          print(f'Performance regressions: {result[\"performance_regressions\"][\"bugs_found\"]}')
          print(f'Lighthouse issues: {result[\"lighthouse\"][\"bugs_found\"]}')
          print(f'Total bugs: {result[\"bugs_found\"]}')
          print(f'Bugs filed: {result[\"filed_bugs\"]}')
          print(f'Report: {result[\"report_path\"]}')
          "

      - name: Upload weekly report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: memory-performance-weekly-report
          path: |
            backend/tests/bug_discovery/storage/reports/*.html
            backend/tests/bug_discovery/storage/reports/*.json
          retention-days: 30
