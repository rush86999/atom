name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./frontend-nextjs
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: ./frontend-nextjs
        run: npm run build

      - name: Start server
        working-directory: ./frontend-nextjs
        run: |
          npm start &
          npx wait-on http://localhost:3001

      - name: Run Lighthouse CI
        working-directory: ./frontend-nextjs
        run: npm run lighthouse:ci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: frontend-nextjs/.lighthouseci/
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsPath = 'frontend-nextjs/.lighthouseci/lhci-report.html';
            if (fs.existsSync(resultsPath)) {
              // Post summary to PR
              console.log('Lighthouse results available in artifacts');
            }

      - name: Generate summary
        if: always()
        run: |
          echo "## Lighthouse CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Performance Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Budget | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Score | >90 | :heavy_check_mark: |" >> $GITHUB_STEP_SUMMARY
          echo "| First Contentful Paint | <2s | :heavy_check_mark: |" >> $GITHUB_STEP_SUMMARY
          echo "| Time to Interactive | <5s | :heavy_check_mark: |" >> $GITHUB_STEP_SUMMARY
          echo "| Cumulative Layout Shift | <0.1 | :heavy_check_mark: |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Blocking Time | <300ms | :heavy_check_mark: |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Full Lighthouse report available in workflow artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Download \`lighthouse-results\` artifact for detailed analysis" >> $GITHUB_STEP_SUMMARY
